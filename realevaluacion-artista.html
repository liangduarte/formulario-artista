<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué tipo de artista eres según un A&R?</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --text: #f0ede8;
    --text-muted: #666660;
    --text-mid: #999992;
    --accent: #c8f542;
    --accent2: #f5c842;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }
  .grain { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); opacity: 0.4; }
  .container { max-width: 680px; margin: 0 auto; padding: 0 24px 80px; position: relative; z-index: 1; }

  .hero { padding: 64px 0 48px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
  .hero-tag { display: inline-block; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 2px; margin-bottom: 24px; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px,6vw,44px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 20px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 15px; color: var(--text-mid); max-width: 540px; line-height: 1.7; }

  .progress-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
  .progress-bar { flex: 1; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 600; color: var(--text-muted); white-space: nowrap; min-width: 60px; text-align: right; }

  .question-card { display: none; animation: fadeUp 0.35s ease both; }
  .question-card.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .q-number { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .q-text { font-family: 'Syne', sans-serif; font-size: clamp(18px,3vw,22px); font-weight: 700; line-height: 1.3; margin-bottom: 32px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 14px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; text-align: left; width: 100%; }
  .option:hover { border-color: #444; background: var(--surface2); transform: translateX(3px); }
  .option.selected { border-color: var(--accent); background: rgba(200,245,66,0.06); }
  .opt-letter { flex-shrink: 0; width: 26px; height: 26px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); transition: background 0.2s, color 0.2s, border-color 0.2s; margin-top: 1px; }
  .option.selected .opt-letter { background: var(--accent); color: #0a0a0a; border-color: var(--accent); }
  .opt-text { font-size: 14px; color: var(--text-mid); line-height: 1.55; transition: color 0.2s; }
  .option.selected .opt-text { color: var(--text); }

  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 36px; }
  .btn { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 12px 28px; border-radius: 4px; border: none; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent); color: #0a0a0a; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  /* EMAIL GATE */
  #email-gate { display: none; animation: fadeUp 0.4s ease both; padding: 48px 0 0; }
  .gate-eyebrow { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .gate-title { font-family: 'Syne', sans-serif; font-size: clamp(24px,5vw,36px); font-weight: 800; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 12px; }
  .gate-sub { font-size: 15px; color: var(--text-mid); margin-bottom: 40px; line-height: 1.7; }
  .email-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 10px; }
  .email-input { width: 100%; padding: 14px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
  .email-input:focus { border-color: var(--accent); }
  .email-input::placeholder { color: var(--text-muted); }
  .email-input.error { border-color: #ff4d4d; }
  .error-msg { font-size: 12px; color: #ff4d4d; margin-bottom: 16px; display: none; }
  .checkbox-wrap { display: flex; align-items: flex-start; gap: 14px; padding: 16px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; margin-bottom: 8px; transition: border-color 0.2s; margin-top: 12px; }
  .checkbox-wrap:hover { border-color: #444; }
  .checkbox-wrap.checked { border-color: var(--accent); background: rgba(200,245,66,0.04); }
  .checkbox-box { flex-shrink: 0; width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; margin-top: 2px; }
  .checkbox-wrap.checked .checkbox-box { background: var(--accent); border-color: var(--accent); }
  .checkmark { display: none; font-size: 12px; color: #0a0a0a; font-weight: 700; }
  .checkbox-wrap.checked .checkmark { display: block; }
  .checkbox-text { font-size: 13px; color: var(--text-mid); line-height: 1.55; }
  .checkbox-text strong { color: var(--text); font-weight: 500; }

  /* RESULT */
  #result-screen { display: none; animation: fadeUp 0.5s ease both; }
  .res-hero { padding: 56px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 52px; position: relative; }
  .res-score-badge { position: absolute; top: 56px; right: 0; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); text-align: right; }
  .res-score-badge span { display: block; font-size: 42px; font-weight: 800; letter-spacing: -0.04em; color: var(--text); line-height: 1; margin-bottom: 4px; }
  .res-profile-tag { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 12px; border-radius: 2px; margin-bottom: 20px; display: inline-block; }
  .res-title { font-family: 'Syne', sans-serif; font-size: clamp(36px,8vw,60px); font-weight: 800; line-height: 1.0; letter-spacing: -0.03em; max-width: 75%; }

  .attr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 48px; }
  @media (max-width: 500px) { .attr-grid { grid-template-columns: 1fr; } .res-title { max-width: 100%; font-size: 32px; } .res-score-badge { position: static; margin-bottom: 24px; } }
  .attr-card { background: var(--surface); padding: 28px 24px; }
  .attr-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .attr-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .attr-value { font-size: 14px; color: var(--text-mid); line-height: 1.65; }

  .dims-section { margin-bottom: 48px; }
  .section-heading { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .dim-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
  .dim-name-col { font-size: 13px; color: var(--text-mid); width: 140px; flex-shrink: 0; }
  .dim-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .dim-fill { height: 100%; border-radius: 2px; transition: width 1.2s cubic-bezier(.22,.68,0,1.2) 0.3s; width: 0%; }
  .dim-pct { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); width: 32px; text-align: right; flex-shrink: 0; }

  .res-cta { border: 1px solid var(--border); border-radius: 8px; padding: 36px 32px; text-align: center; background: var(--surface); }
  .res-cta-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .res-cta-sub { font-size: 14px; color: var(--text-mid); margin-bottom: 28px; line-height: 1.6; }
  .btn-restart { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 22px; border-radius: 4px; cursor: pointer; margin-top: 14px; display: inline-block; transition: color 0.2s, border-color 0.2s; }
  .btn-restart:hover { color: var(--text); border-color: #555; }

  .tag-explorador { background: rgba(126,184,245,0.12); color: #7eb8f5; border: 1px solid rgba(126,184,245,0.3); }
  .tag-emergente  { background: rgba(245,200,66,0.12);  color: #f5c842; border: 1px solid rgba(245,200,66,0.3); }
  .tag-desarrollo { background: rgba(184,245,126,0.12); color: #b8f57e; border: 1px solid rgba(184,245,126,0.3); }
  .tag-escalar    { background: rgba(200,245,66,0.12);  color: #c8f542; border: 1px solid rgba(200,245,66,0.3); }
  .color-explorador { color: #7eb8f5; } .fill-explorador { background: #7eb8f5; }
  .color-emergente  { color: #f5c842; } .fill-emergente  { background: #f5c842; }
  .color-desarrollo { color: #b8f57e; } .fill-desarrollo { background: #b8f57e; }
  .color-escalar    { color: #c8f542; } .fill-escalar    { background: #c8f542; }
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">

  <div class="hero" id="hero">
    <div class="hero-tag">Evaluación estratégica</div>
    <h1>¿Qué tipo de artista eres<br><span>según un A&R?</span></h1>
    <p>15 preguntas para identificar tu etapa de desarrollo, claridad artística y preparación para crecer dentro de la industria musical.</p>
  </div>

  <div id="form-section">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 15</div>
    </div>
    <div id="questions-wrap"></div>
    <div class="nav">
      <button class="btn btn-ghost" id="btn-back" onclick="goBack()">← Anterior</button>
      <button class="btn btn-primary" id="btn-next" onclick="goNext()" disabled>Siguiente →</button>
    </div>
  </div>

  <!-- EMAIL GATE REMOVED - email captured via Google Forms before entering -->

  <div id="result-screen"></div>
</div>

<script>
const questions = [
  { text: "Sobre tu catálogo actual de canciones:", options: ["Es bastante variado porque estoy probando cosas.", "Hay algunas canciones fuertes pero el sonido todavía está evolucionando.", "Empieza a verse una identidad clara en mi música.", "Mi catálogo refleja claramente quién soy como artista."], dim: "identidad" },
  { text: "Sobre tu presencia en redes sociales:", options: ["No tengo una estrategia clara, publico cuando puedo.", "Intento ser constante pero aún no tengo una línea clara.", "Tengo una estrategia definida y contenido alineado a mi música.", "Tengo una marca clara y contenido optimizado que conecta con mi audiencia."], dim: "branding" },
  { text: "Sobre tu audiencia:", options: ["Todavía no sé bien quién es mi público.", "Empiezo a ver quién conecta con mi música.", "Tengo identificado a mi público y sé cómo hablarle.", "Tengo una comunidad activa que responde a mis lanzamientos."], dim: "audiencia" },
  { text: "Sobre tus lanzamientos musicales:", options: ["Lanzo música sin mucha planificación.", "Estoy empezando a planificar mejor mis lanzamientos.", "Tengo un plan de lanzamientos estructurado.", "Tengo un sistema claro que maximiza cada lanzamiento."], dim: "estrategia" },
  { text: "Sobre tu visión como artista:", options: ["Estoy descubriendo qué tipo de artista quiero ser.", "Tengo una idea, pero aún la estoy definiendo.", "Tengo una visión clara y estoy trabajando en ella.", "Tengo una visión sólida y sé cómo ejecutarla estratégicamente."], dim: "identidad" },
  { text: "Sobre tu identidad artística:", options: ["Estoy probando distintos estilos y aún no tengo uno definido.", "Tengo un estilo base pero sigo experimentando bastante.", "Tengo un estilo claro y coherente.", "Tengo una identidad única y reconocible en el mercado."], dim: "identidad" },
  { text: "Sobre la calidad de tu música:", options: ["Grabo como puedo, todavía estoy aprendiendo.", "Ya tengo mejor calidad, pero no es consistente.", "Trabajo con buen nivel de producción de forma constante.", "Mi música compite a nivel profesional en el mercado."], dim: "produccion" },
  { text: "Sobre tu equipo de trabajo:", options: ["Trabajo solo.", "Colaboro ocasionalmente con otros.", "Tengo un equipo o colaboradores frecuentes.", "Tengo un equipo estructurado (productor, manager, etc.)."], dim: "estrategia" },
  { text: "Sobre tus números (streams / redes):", options: ["Tengo muy pocos números aún.", "Estoy empezando a crecer poco a poco.", "Tengo números estables y en crecimiento.", "Tengo números fuertes y consistentes."], dim: "audiencia" },
  { text: "Sobre tu consistencia:", options: ["Soy irregular, a veces lanzo, a veces no.", "Intento ser constante pero me cuesta mantenerlo.", "Soy constante con mis lanzamientos y contenido.", "Tengo un calendario sólido y disciplinado."], dim: "consistencia" },
  { text: "Sobre tu estrategia:", options: ["No tengo estrategia clara.", "Estoy empezando a entender cómo funciona.", "Tengo una estrategia definida.", "Optimizo mi estrategia basado en datos."], dim: "estrategia" },
  { text: "Sobre tu branding visual:", options: ["No tengo identidad visual definida.", "Tengo algunos elementos pero no son consistentes.", "Tengo una estética clara.", "Tengo un branding sólido y profesional."], dim: "branding" },
  { text: "Sobre monetización:", options: ["No genero ingresos aún.", "He generado algo, pero no es estable.", "Tengo ingresos constantes de mi música.", "Tengo múltiples fuentes de ingreso como artista."], dim: "industria" },
  { text: "Sobre tu mentalidad profesional:", options: ["Veo la música como hobby.", "Quiero vivir de esto pero aún estoy aprendiendo.", "Lo tomo como una carrera profesional.", "Pienso como negocio y marca artística."], dim: "consistencia" },
  { text: "Sobre oportunidades en la industria:", options: ["Aún no he tenido oportunidades reales.", "He tenido algunas oportunidades pequeñas.", "He trabajado con personas clave de la industria.", "Estoy conectado con actores relevantes y oportunidades grandes."], dim: "industria" },
];

const profiles = [
  {
    key: "explorador", name: "Explorador", range: [15,25], emoji: "🧭",
    tagline: "Explorador Creativo",
    caracteristicas: "Curiosidad creativa intensa, exploración libre de estilos y géneros. Estás en una etapa de descubrimiento donde todo es posible.",
    fortaleza: "Autenticidad y libertad creativa. No tienes los límites que a veces impone el éxito temprano. Tu lienzo está en blanco.",
    riesgo: "Falta de foco y dirección. Sin una identidad definida, es difícil construir una audiencia fiel o destacar en la industria.",
    recomendacion: "Define tu identidad artística y sonido propio antes de escalar. Elige una dirección y trabájala con consistencia durante al menos 6 meses.",
  },
  {
    key: "emergente", name: "Emergente", range: [26,36], emoji: "🌱",
    tagline: "Artista Emergente",
    caracteristicas: "Tienes señales claras de identidad y empiezas a generar tracción. Tu música conecta con algunas personas y tienes una base inicial.",
    fortaleza: "Momentum y aprendizaje activo. Estás absorbiendo información rápido y ajustando tu enfoque con cada lanzamiento.",
    riesgo: "Inconsistencia y falta de estructura. Sin un plan claro, el crecimiento puede ser lento e impredecible.",
    recomendacion: "Estructura tus lanzamientos y define tu estrategia de contenido. Un plan básico puede duplicar el impacto de cada canción.",
  },
  {
    key: "desarrollo", name: "En Desarrollo", range: [37,47], emoji: "⚡",
    tagline: "Artista en Desarrollo",
    caracteristicas: "Base sólida construida, identidad reconocible y resultados reales. Empiezas a operar con mentalidad profesional.",
    fortaleza: "Estructura y claridad estratégica. Sabes quién eres, a quién le hablas y cómo moverte dentro de la industria.",
    riesgo: "Estancamiento por falta de optimización. Sin datos y sin el equipo correcto, puedes llegar a un techo difícil de romper.",
    recomendacion: "Toma decisiones basadas en datos y empieza a construir o fortalecer tu equipo. Delegar es el paso que separa el artista independiente del profesional escalable.",
  },
  {
    key: "escalar", name: "Listo para Escalar", range: [48,60], emoji: "🚀",
    tagline: "Listo para Escalar",
    caracteristicas: "Claridad artística total, estructura profesional, equipo sólido y números consistentes. Estás operando como una marca artística real.",
    fortaleza: "Visión estratégica y ejecución disciplinada. Piensas como negocio sin perder tu esencia artística.",
    riesgo: "Complacencia o falta de conexiones a mayor escala. El siguiente nivel no se logra solo con más trabajo, sino con las alianzas correctas.",
    recomendacion: "Posiciónate activamente en la industria. Tours, sincronizaciones, acuerdos de distribución y partnerships de marca son tu próximo territorio.",
  }
];

const dimLabels = { identidad:"Identidad artística", branding:"Branding", audiencia:"Audiencia", estrategia:"Estrategia", produccion:"Producción", consistencia:"Consistencia", industria:"Industria" };

let current = 0, answers = new Array(15).fill(null), consentChecked = false;

function buildQuestions() {
  const wrap = document.getElementById('questions-wrap');
  questions.forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'question-card' + (i===0?' active':'');
    card.id = `q-${i}`;
    const letters = ['A','B','C','D'];
    card.innerHTML = `<div class="q-number">Pregunta ${i+1} de 15</div><div class="q-text">${q.text}</div><div class="options">${q.options.map((opt,j)=>`<button class="option" onclick="selectOption(${i},${j})"><span class="opt-letter">${letters[j]}</span><span class="opt-text">${opt}</span></button>`).join('')}</div>`;
    wrap.appendChild(card);
  });
}

function selectOption(qIdx, optIdx) {
  answers[qIdx] = optIdx;
  document.querySelectorAll(`#q-${qIdx} .option`).forEach((el,i)=>el.classList.toggle('selected',i===optIdx));
  document.getElementById('btn-next').disabled = false;
  if (qIdx===14) document.getElementById('btn-next').textContent = 'Ver mi resultado →';
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = (current/15*100)+'%';
  document.getElementById('progress-label').textContent = `${current} / 15`;
}

function showQuestion(idx) {
  document.querySelectorAll('.question-card').forEach(c=>c.classList.remove('active'));
  const card = document.getElementById(`q-${idx}`);
  card.classList.add('active'); card.style.animation='none'; card.offsetHeight; card.style.animation='';
  document.getElementById('btn-back').style.visibility = idx===0?'hidden':'visible';
  document.getElementById('btn-next').disabled = answers[idx]===null;
  document.getElementById('btn-next').textContent = idx===14?'Continuar →':'Siguiente →';
  updateProgress();
}

function goNext() {
  if (answers[current]===null) return;
  if (current<14) { current++; showQuestion(current); }
  else {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('hero').style.display = 'none';
    showResult();
  }
}

function goBack() {
  if (current>0) { current--; showQuestion(current); }
}

function calcScore() { return answers.reduce((s,a)=>s+(a!==null?a+1:0),0); }

function calcDims() {
  const dims = {};
  questions.forEach((q,i)=>{ if(!dims[q.dim]) dims[q.dim]={total:0,count:0}; dims[q.dim].total+=(answers[i]!==null?answers[i]+1:0); dims[q.dim].count++; });
  const r={};
  for(const k in dims) r[k]=Math.round((dims[k].total/(dims[k].count*4))*100);
  return r;
}

function getProfile(score) { return profiles.find(p=>score>=p.range[0]&&score<=p.range[1])||profiles[0]; }

function showResult() {
  const score = calcScore();
  const dims = calcDims();
  const profile = getProfile(score);

  const dimRows = Object.entries(dims).map(([k,v])=>`
    <div class="dim-row">
      <div class="dim-name-col">${dimLabels[k]||k}</div>
      <div class="dim-track"><div class="dim-fill fill-${profile.key}" style="width:0%" data-w="${v}%"></div></div>
      <div class="dim-pct">${v}%</div>
    </div>`).join('');

  const screen = document.getElementById('result-screen');
  screen.innerHTML = `
    <div class="res-hero">
      <div class="res-score-badge"><span>${score}</span>de 60 pts</div>
      <div class="res-profile-tag tag-${profile.key}">${profile.emoji} ${profile.name}</div>
      <div class="res-title color-${profile.key}">${profile.tagline}</div>
    </div>

    <div class="attr-grid">
      <div class="attr-card">
        <div class="attr-label"><span class="attr-dot" style="background:#7eb8f5"></span>Características</div>
        <div class="attr-value">${profile.caracteristicas}</div>
      </div>
      <div class="attr-card">
        <div class="attr-label"><span class="attr-dot" style="background:#c8f542"></span>Fortaleza</div>
        <div class="attr-value">${profile.fortaleza}</div>
      </div>
      <div class="attr-card">
        <div class="attr-label"><span class="attr-dot" style="background:#ff6b6b"></span>Riesgo</div>
        <div class="attr-value">${profile.riesgo}</div>
      </div>
      <div class="attr-card">
        <div class="attr-label"><span class="attr-dot" style="background:#f5c842"></span>Recomendación</div>
        <div class="attr-value">${profile.recomendacion}</div>
      </div>
    </div>

    <div class="dims-section">
      <div class="section-heading">Desglose por dimensión</div>
      ${dimRows}
    </div>

    <div style="text-align:center;padding:32px 0 0;">
      <button class="btn-restart" onclick="restartForm()">↺ Hacer el test de nuevo</button>
    </div>`;

  screen.style.display = 'block';
  requestAnimationFrame(()=>{ setTimeout(()=>{ document.querySelectorAll('.dim-fill').forEach(el=>{ el.style.width=el.dataset.w; }); }, 200); });
}

function restartForm() {
  answers = new Array(15).fill(null); current = 0;
  document.querySelectorAll('.option').forEach(el=>el.classList.remove('selected'));
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('hero').style.display = 'block';
  document.getElementById('form-section').style.display = 'block';
  showQuestion(0);
}

buildQuestions();
showQuestion(0);
</script>
</body>
</html>
